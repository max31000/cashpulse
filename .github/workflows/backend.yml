# Backend CI/CD pipeline
name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'CashPulse.sln'
      - '.github/workflows/backend.yml'

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.sln') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore CashPulse.sln

      - name: Build
        run: dotnet build CashPulse.sln --no-restore -c Release

      - name: Unit tests
        run: dotnet test tests/CashPulse.Tests/CashPulse.Tests.csproj --no-build -c Release --verbosity normal

      - name: Integration tests
        run: dotnet test tests/CashPulse.IntegrationTests/CashPulse.IntegrationTests.csproj --no-build -c Release --verbosity normal
        env:
          DOTNET_ENVIRONMENT: Testing

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: src/CashPulse.Api/Dockerfile
          tags: |
            ghcr.io/${{ github.repository_owner }}/cashpulse-api:latest
            ghcr.io/${{ github.repository_owner }}/cashpulse-api:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on VDS
        uses: appleboy/ssh-action@v1
        env:
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          envs: DB_CONNECTION_STRING,JWT_SECRET,TELEGRAM_BOT_TOKEN
          script: |
            set -e
            docker pull ghcr.io/${{ github.repository_owner }}/cashpulse-api:latest
            docker stop cashpulse-api && docker rm cashpulse-api || true
            docker run -d \
              --name cashpulse-api \
              --network cashpulse-network \
              --restart unless-stopped \
              -p 127.0.0.1:5000:5000 \
              -e "ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}" \
              -e "JwtSettings__Secret=${JWT_SECRET}" \
              -e "TelegramSettings__BotToken=${TELEGRAM_BOT_TOKEN}" \
              ghcr.io/${{ github.repository_owner }}/cashpulse-api:latest
            sleep 3
            curl -sf http://localhost:5000/health || (echo "Health check failed!" && exit 1)
            docker image prune -f

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="❌ CashPulse API deploy failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
