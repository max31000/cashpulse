name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'cashpulse-web/**'
      - '.github/workflows/frontend.yml'

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # NOTE: когда репозиторий станет публичным — раскомментировать блок ниже
    # и удалить шаг "Deploy to VDS via SCP"
    # permissions:
    #   contents: write  # required for gh-pages branch

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: cashpulse-web

      - name: Type check
        run: yarn typecheck
        working-directory: cashpulse-web

      - name: Build
        run: yarn build
        working-directory: cashpulse-web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # Деплой на VDS через SCP (пока репозиторий приватный)
      # Когда репозиторий станет публичным — заменить на GitHub Pages (см. комментарий ниже)
      - name: Deploy to VDS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          source: cashpulse-web/dist/*
          target: /var/www/cashpulse/
          strip_components: 2
          rm: true

      # FUTURE: GitHub Pages (раскомментировать когда репо станет публичным)
      # - name: Deploy to GitHub Pages
      #   uses: JamesIves/github-pages-deploy-action@v4
      #   with:
      #     folder: cashpulse-web/dist
      #     branch: gh-pages
      #     clean: true
